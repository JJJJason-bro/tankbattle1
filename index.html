<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 坦克大战 - Tank Battle</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --panel: #16213e;
            --accent: #e94560;
            --gold: #f5c842;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* 星空背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(1px 1px at 10% 20%, rgba(255, 255, 255, 0.4), transparent),
                radial-gradient(1px 1px at 30% 70%, rgba(255, 255, 255, 0.3), transparent),
                radial-gradient(1.5px 1.5px at 50% 30%, rgba(255, 255, 255, 0.5), transparent),
                radial-gradient(1px 1px at 70% 60%, rgba(255, 255, 255, 0.3), transparent),
                radial-gradient(1.5px 1.5px at 90% 40%, rgba(255, 255, 255, 0.4), transparent),
                radial-gradient(1px 1px at 20% 90%, rgba(255, 255, 255, 0.3), transparent),
                radial-gradient(1px 1px at 60% 10%, rgba(255, 255, 255, 0.3), transparent),
                radial-gradient(1.5px 1.5px at 80% 80%, rgba(255, 255, 255, 0.4), transparent);
            pointer-events: none;
            z-index: 0;
        }

        .game-wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .game-header {
            display: flex;
            align-items: center;
            gap: 30px;
            width: 100%;
            max-width: 780px;
            justify-content: space-between;
        }

        .game-title {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #e94560, #f5c842);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            text-shadow: none;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--panel);
            padding: 8px 16px;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 0.95rem;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .stat-icon {
            font-size: 1.3rem;
        }
        .stat-value {
            color: var(--gold);
            font-size: 1.2rem;
            min-width: 30px;
            text-align: center;
        }
        .stat.lives .stat-value {
            color: #ff6b6b;
        }
        .stat.level .stat-value {
            color: #51cf66;
        }

        #gameCanvas {
            border: 3px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            box-shadow:
                0 0 30px rgba(233, 69, 96, 0.2),
                0 0 60px rgba(233, 69, 96, 0.1),
                0 10px 40px rgba(0, 0, 0, 0.5);
            background: #0a0a0a;
            cursor: crosshair;
            max-width: 100vw;
            max-height: 70vh;
        }

        .controls-info {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .key-hint {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #888;
            font-size: 0.8rem;
        }

        .key-badge {
            display: inline-block;
            background: var(--panel);
            color: #ccc;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.15);
            min-width: 22px;
            text-align: center;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            visibility: hidden;
        }

        .overlay.active {
            pointer-events: all;
            opacity: 1;
            visibility: visible;
        }

        .overlay-content {
            background: var(--panel);
            padding: 40px 50px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .overlay-title {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #e94560, #f5c842);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .overlay-subtitle {
            color: #aaa;
            margin-bottom: 25px;
            font-size: 1rem;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: 14px 40px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
            font-family: inherit;
        }

        .btn-start {
            background: linear-gradient(135deg, #e94560, #c0392b);
            color: #fff;
            box-shadow: 0 4px 20px rgba(233, 69, 96, 0.4);
        }
        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(233, 69, 96, 0.6);
        }
        .btn-start:active {
            transform: translateY(0);
        }

        .btn-restart {
            background: linear-gradient(135deg, #f5c842, #e67e22);
            color: #1a1a2e;
            box-shadow: 0 4px 20px rgba(245, 200, 66, 0.4);
        }
        .btn-restart:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(245, 200, 66, 0.6);
        }

        /* 移动端触摸控制 */
        .touch-controls {
            display: none;
            gap: 10px;
            margin-top: 10px;
        }

        .touch-row {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .touch-btn {
            width: 55px;
            height: 55px;
            border-radius: 14px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: var(--panel);
            color: #fff;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .touch-btn:active {
            background: var(--accent);
            border-color: var(--accent);
        }
        .touch-btn.fire {
            width: 120px;
            background: var(--accent);
            border-color: var(--accent);
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        @media (max-width: 850px) {
            .touch-controls {
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            #gameCanvas {
                max-width: 95vw;
                max-height: 55vh;
            }
            .game-title {
                font-size: 1.4rem;
            }
            .game-header {
                gap: 12px;
            }
            .stat {
                padding: 6px 10px;
                font-size: 0.8rem;
            }
        }

        @media (min-width: 851px) {
            .touch-controls {
                display: none !important;
            }
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <!-- 头部信息 -->
        <div class="game-header">
            <div class="stat level">
                <span class="stat-icon">🏴</span>
                <span>关卡</span>
                <span class="stat-value" id="levelDisplay">1</span>
            </div>
            <div class="game-title">坦 克 大 战</div>
            <div class="stat">
                <span class="stat-icon">⭐</span>
                <span>得分</span>
                <span class="stat-value" id="scoreDisplay">0</span>
            </div>
            <div class="stat lives">
                <span class="stat-icon">❤️</span>
                <span>生命</span>
                <span class="stat-value" id="livesDisplay">3</span>
            </div>
        </div>

        <!-- 游戏画布 -->
        <canvas id="gameCanvas"></canvas>

        <!-- 键盘提示 -->
        <div class="controls-info">
            <span class="key-hint"><span class="key-badge">↑↓←→</span> 移动</span>
            <span class="key-hint"><span class="key-badge">W A S D</span> 移动</span>
            <span class="key-hint"><span class="key-badge">空格</span> 射击</span>
            <span class="key-hint"><span class="key-badge">P</span> 暂停</span>
            <span class="key-hint"><span class="key-badge">R</span> 重新开始</span>
        </div>

        <!-- 移动端触摸控制 -->
        <div class="touch-controls" id="touchControls">
            <div class="touch-row">
                <div class="touch-btn" data-key="ArrowUp">▲</div>
            </div>
            <div class="touch-row">
                <div class="touch-btn" data-key="ArrowLeft">◀</div>
                <div class="touch-btn fire" data-key=" ">🔥 开火</div>
                <div class="touch-btn" data-key="ArrowRight">▶</div>
            </div>
            <div class="touch-row">
                <div class="touch-btn" data-key="ArrowDown">▼</div>
            </div>
        </div>
    </div>

    <!-- 开始画面 -->
    <div class="overlay active" id="startOverlay">
        <div class="overlay-content">
            <div class="overlay-title">坦 克 大 战</div>
            <div class="overlay-subtitle">
                🎯 消灭所有敌方坦克<br>
                💎 保护你的基地<br>
                ⚡ 收集道具增强火力
            </div>
            <button class="btn btn-start" id="btnStart">开 始 游 戏</button>
        </div>
    </div>

    <!-- 游戏结束画面 -->
    <div class="overlay" id="gameOverOverlay">
        <div class="overlay-content">
            <div class="overlay-title" id="gameOverTitle">游戏结束</div>
            <div class="overlay-subtitle" id="gameOverSubtitle"></div>
            <button class="btn btn-restart" id="btnRestart">再 来 一 局</button>
        </div>
    </div>

    <!-- 暂停画面 -->
    <div class="overlay" id="pauseOverlay">
        <div class="overlay-content">
            <div class="overlay-title">暂 停</div>
            <div class="overlay-subtitle">按 P 或点击按钮继续</div>
            <button class="btn btn-start" id="btnResume">继 续 游 戏</button>
        </div>
    </div>

    <script>
        (function() {
            // ==================== 常量与配置 ====================
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');

            const TILE_SIZE = 40;
            const COLS = 19;
            const ROWS = 14;
            const WIDTH = COLS * TILE_SIZE;
            const HEIGHT = ROWS * TILE_SIZE;

            canvas.width = WIDTH;
            canvas.height = HEIGHT;

            // 瓦片类型
            const EMPTY = 0;
            const BRICK = 1;
            const STEEL = 2;
            const WATER = 3;
            const TREE = 4;
            const BASE = 5;

            // 方向
            const UP = 0;
            const RIGHT = 1;
            const DOWN = 2;
            const LEFT = 3;

            // 坦克大小
            const TANK_SIZE = 32;
            const TANK_HALF = TANK_SIZE / 2;

            // ==================== DOM 元素 ====================
            const scoreDisplay = document.getElementById('scoreDisplay');
            const livesDisplay = document.getElementById('livesDisplay');
            const levelDisplay = document.getElementById('levelDisplay');
            const startOverlay = document.getElementById('startOverlay');
            const gameOverOverlay = document.getElementById('gameOverOverlay');
            const gameOverTitle = document.getElementById('gameOverTitle');
            const gameOverSubtitle = document.getElementById('gameOverSubtitle');
            const pauseOverlay = document.getElementById('pauseOverlay');
            const btnStart = document.getElementById('btnStart');
            const btnRestart = document.getElementById('btnRestart');
            const btnResume = document.getElementById('btnResume');
            const touchControls = document.getElementById('touchControls');

            // ==================== 音效系统 ====================
            let audioCtx = null;

            function initAudio() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
            }

            let audioCallsThisFrame = 0;
            const MAX_AUDIO_PER_FRAME = 6;
            function playSound(freq, duration, type = 'square', vol = 0.08) {
                if (!audioCtx || audioCallsThisFrame >= MAX_AUDIO_PER_FRAME) return;
                audioCallsThisFrame++;
                try {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(audioCtx.currentTime);
                    osc.stop(audioCtx.currentTime + duration);
                } catch (e) { /* 静默处理 */ }
            }

            function sfxShoot() { playSound(200, 0.1, 'square', 0.06);
                playSound(80, 0.15, 'sawtooth', 0.04); }

            function sfxHit() { playSound(60, 0.2, 'sawtooth', 0.08);
                playSound(40, 0.3, 'triangle', 0.06); }

            function sfxExplosion() { playSound(30, 0.5, 'sawtooth', 0.12);
                playSound(20, 0.6, 'triangle', 0.08); }

            function sfxPowerUp() { playSound(600, 0.1, 'square', 0.06);
                playSound(800, 0.1, 'square', 0.06);
                playSound(1000, 0.15, 'square', 0.06); }

            function sfxGameOver() { playSound(150, 0.3, 'sawtooth', 0.08);
                playSound(100, 0.4, 'triangle', 0.06);
                playSound(60, 0.6, 'triangle', 0.05); }

            function sfxLevelUp() { playSound(400, 0.1, 'square', 0.06);
                playSound(600, 0.1, 'square', 0.06);
                playSound(800, 0.1, 'square', 0.06);
                playSound(1000, 0.2, 'square', 0.08); }

            // ==================== 背景音乐系统 ====================
            class BattleMusic {
                constructor() {
                    this.ctx = null;
                    this.masterGain = null;
                    this.active = false;
                    this.currentTrack = 0;
                    this.trackGains = [];
                    this.nextTrackTime = 0;
                    this.schedulerTimer = null;
                    this.trackDuration = 35; // 每首35秒切换
                }

                init() {
                    if (this.ctx) return;
                    this.ctx = audioCtx;
                    if (!this.ctx) return;
                    this.masterGain = this.ctx.createGain();
                    this.masterGain.gain.value = 0.25; // 背景音乐音量25%
                    this.masterGain.connect(this.ctx.destination);
                }

                start() {
                    this.init();
                    if (!this.ctx) return;
                    if (this.active) return;
                    this.active = true;
                    this.currentTrack = Math.floor(Math.random() * 4);
                    this.nextTrackTime = this.ctx.currentTime + this.trackDuration;
                    this._switchTrack(this.currentTrack, 0.5);
                    this._startScheduler();
                }

                stop() {
                    this.active = false;
                    this._clearTracks();
                    if (this.schedulerTimer) { clearInterval(this.schedulerTimer); this.schedulerTimer = null; }
                }

                pause() {
                    if (!this.active) return;
                    this.active = false;
                    this._clearTracks();
                    if (this.schedulerTimer) { clearInterval(this.schedulerTimer); this.schedulerTimer = null; }
                }

                resume() {
                    if (this.active) return;
                    this.active = true;
                    this.schedulerTimer = null; // 允许重新创建
                    this.currentTrack = Math.floor(Math.random() * 4);
                    this.nextTrackTime = this.ctx.currentTime + this.trackDuration;
                    this._lastSchedule = 0;
                    this._switchTrack(this.currentTrack, 0.3);
                    this._startScheduler();
                }

                _clearTracks() {
                    for (const g of this.trackGains) {
                        try { g.gain.cancelScheduledValues(this.ctx.currentTime); } catch(e){}
                        try { g.disconnect(); } catch(e){}
                    }
                    this.trackGains = [];
                }

                _startScheduler() {
                    if (this.schedulerTimer) return;
                    this.schedulerTimer = setInterval(() => {
                        if (!this.active || !this.ctx) return;
                        const now = this.ctx.currentTime;
                        // 检查是否需要切换曲目
                        if (now >= this.nextTrackTime) {
                            this.currentTrack = (this.currentTrack + 1) % 4;
                            this.nextTrackTime = now + this.trackDuration;
                            this._switchTrack(this.currentTrack, 0.6);
                        }
                        // 预调度未来1秒的音符
                        this._scheduleTrack(now, now + 1.2);
                    }, 200);
                }

                _switchTrack(idx, fadeTime) {
                    // 淡出旧轨道
                    for (const g of this.trackGains) {
                        try {
                            const t = this.ctx.currentTime;
                            g.gain.setValueAtTime(g.gain.value, t);
                            g.gain.linearRampToValueAtTime(0, t + fadeTime);
                            setTimeout(() => { try { g.disconnect(); } catch(e){} }, fadeTime * 1000 + 100);
                        } catch(e){}
                    }
                    this.trackGains = [];
                    this._lastSchedule = 0; // 重置调度指针
                }

                _createGainNode() {
                    const g = this.ctx.createGain();
                    g.gain.value = 0;
                    g.connect(this.masterGain);
                    this.trackGains.push(g);
                    return g;
                }

                // ═══════ 4首曲目 ═══════
                _scheduleTrack(from, to) {
                    if (from < (this._lastSchedule || 0)) from = this._lastSchedule || from;
                    if (from >= to - 0.1) return;
                    this._lastSchedule = to;

                    const t = this.currentTrack;
                    const bpm = [125, 140, 130, 110][t];
                    const beat = 60 / bpm;
                    const ctx = this.ctx;

                    // 找到最近的节拍起点
                    const beatStart = Math.ceil(from / beat) * beat;

                    if (t === 0) this._trackMarchingDrums(beatStart, to, beat, ctx);
                    else if (t === 1) this._trackIndustrial(beatStart, to, beat, ctx);
                    else if (t === 2) this._trackElectronic(beatStart, to, beat, ctx);
                    else this._trackOrchestral(beatStart, to, beat, ctx);
                }

                // Track 0: 快速行军鼓 + 低音贝斯
                _trackMarchingDrums(from, to, beat, ctx) {
                    const g = this.trackGains[this.trackGains.length - 1] || this._createGainNode();
                    g.gain.setTargetAtTime(0.5, ctx.currentTime, 0.1);
                    for (let t = from; t < to; t += beat) {
                        const bi = Math.round((t - from) / beat);
                        // 大鼓（每拍）
                        if (bi % 2 === 0) this._note(ctx, g, 55, 0.08, 1.2, 'sine', t, 0.5);
                        // 军鼓（反拍）
                        if (bi % 2 === 1) this._note(ctx, g, 200, 0.04, 0.3, 'triangle', t, 0.3);
                        // 踩镲（八分音符）
                        if (bi % 1 === 0) this._note(ctx, g, 800, 0.02, 0.06, 'square', t, 0.15);
                        // 贝斯线（4拍循环）
                        if (bi % 8 === 0) {
                            const bassNotes = [82, 98, 110, 98];
                            bassNotes.forEach((f, i) => {
                                this._note(ctx, g, f, 0.15, 0.7, 'sawtooth', t + i * beat * 2, 0.4);
                            });
                        }
                    }
                }

                // Track 1: 工业金属
                _trackIndustrial(from, to, beat, ctx) {
                    const g = this.trackGains[this.trackGains.length - 1] || this._createGainNode();
                    g.gain.setTargetAtTime(0.5, ctx.currentTime, 0.1);
                    const halfBeat = beat / 2;
                    for (let t = from; t < to; t += halfBeat) {
                        const bi = Math.round((t - from) / halfBeat);
                        // 双大鼓
                        if (bi % 4 === 0 || bi % 4 === 2) this._note(ctx, g, 60, 0.06, 0.6, 'sine', t, 0.6);
                        // 军鼓重击
                        if (bi % 4 === 1) this._note(ctx, g, 180, 0.03, 0.25, 'square', t, 0.45);
                        // 失真的power chord
                        if (bi % 8 === 0) {
                            const chords = [
                                [110, 138, 165], [98, 123, 147],
                                [82, 110, 130], [98, 123, 147]
                            ];
                            const chordIdx = Math.floor(bi / 8) % 4;
                            const chord = chords[chordIdx];
                            chord.forEach(f => {
                                this._note(ctx, g, f, 0.3, 0.9, 'sawtooth', t, 0.18);
                            });
                        }
                    }
                }

                // Track 2: 电子脉冲
                _trackElectronic(from, to, beat, ctx) {
                    const g = this.trackGains[this.trackGains.length - 1] || this._createGainNode();
                    g.gain.setTargetAtTime(0.5, ctx.currentTime, 0.1);
                    const quarter = beat / 4;
                    for (let t = from; t < to; t += quarter) {
                        const bi = Math.round((t - from) / quarter);
                        // 808 式底鼓
                        if (bi % 4 === 0) this._note(ctx, g, 50, 0.1, 0.8, 'sine', t, 0.7);
                        // 拍手声
                        if (bi % 4 === 2) this._note(ctx, g, 1000, 0.02, 0.12, 'square', t, 0.25);
                        // 电子琶音
                        if (bi % 1 === 0 && bi % 4 !== 0) {
                            const arp = [220, 330, 440, 550, 440, 330, 277, 330];
                            const f = arp[bi % arp.length];
                            this._note(ctx, g, f, 0.06, 0.15, 'square', t, 0.12);
                        }
                    }
                }

                // Track 3: 管弦战斗
                _trackOrchestral(from, to, beat, ctx) {
                    const g = this.trackGains[this.trackGains.length - 1] || this._createGainNode();
                    g.gain.setTargetAtTime(0.5, ctx.currentTime, 0.1);
                    for (let t = from; t < to; t += beat) {
                        const bi = Math.round((t - from) / beat);
                        // 定音鼓
                        if (bi % 4 === 0) this._note(ctx, g, 73, 0.12, 1.0, 'triangle', t, 0.55);
                        if (bi % 4 === 2) this._note(ctx, g, 87, 0.1, 0.8, 'triangle', t, 0.45);
                        // 铜管和弦（每8拍）
                        if (bi % 8 === 0) {
                            const brass = [
                                [196, 247, 294], [165, 220, 262],
                                [147, 196, 247], [165, 220, 262]
                            ];
                            const chord = brass[Math.floor(bi / 8) % 4];
                            chord.forEach(f => {
                                this._note(ctx, g, f, 0.4, 1.0, 'sawtooth', t, 0.15);
                            });
                        }
                        // 弦乐铺底
                        if (bi % 16 === 0) {
                            [98, 130, 165].forEach(f => {
                                this._note(ctx, g, f, 0.8, 4.0, 'sine', t, 0.1);
                            });
                        }
                    }
                }

                _note(ctx, parentGain, freq, dur, vol, type, startTime, gainVal) {
                    if (startTime < ctx.currentTime - 0.1) return; // 跳过过去的音符
                    try {
                        const osc = ctx.createOscillator();
                        const g = ctx.createGain();
                        osc.type = type;
                        osc.frequency.value = freq;
                        g.gain.setValueAtTime(0, startTime);
                        g.gain.linearRampToValueAtTime(gainVal, startTime + 0.01);
                        g.gain.setValueAtTime(gainVal, startTime + dur * 0.7);
                        g.gain.exponentialRampToValueAtTime(0.001, startTime + dur);
                        osc.connect(g);
                        g.connect(parentGain);
                        osc.start(startTime);
                        osc.stop(startTime + dur + 0.05);
                    } catch(e) { /* 忽略音符合成错误 */ }
                }
            }

            const battleMusic = new BattleMusic();

            // ==================== 游戏状态 ====================
            let gameState = 'start'; // start | playing | paused | gameover
            let frameCount = 0;
            let lastFrameTime = 0;
            let heavyFrame = false; // 帧耗时过长时跳过繁重操作
            let score = 0;
            let lives = 3;
            let level = 1;
            let playerTank = null;
            let enemies = [];
            let bullets = [];
            let explosions = [];
            let powerUps = [];
            let map = [];
            let baseAlive = true;
            let enemySpawnTimer = 0;
            let enemySpawnInterval = 180;
            let enemiesRemaining = 0;
            let enemiesSpawned = 0;
            let totalEnemies = 20;
            let enemiesPerLevel = 20;
            let shakeTimer = 0;
            let shakeIntensity = 0;

            // ==================== 键盘输入 ====================
            const keys = {};
            document.addEventListener('keydown', e => {
                // 阻止浏览器默认行为（如空格滚动页面）
                if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'ArrowDown' ||
                    e.code === 'ArrowLeft' || e.code === 'ArrowRight') {
                    e.preventDefault();
                }
                // 移动键 — 同时用 key 和 code 确保兼容
                const kl = (typeof e.key === 'string') ? e.key.toLowerCase() : '';
                if (kl) keys[kl] = true;
                keys[e.code] = true;
                // 暂停/继续 — 用 code 避免输入法问题
                if (e.code === 'KeyP') {
                    e.preventDefault();
                    togglePause();
                }
                // 重新开始
                if (e.code === 'KeyR') {
                    e.preventDefault();
                    restartGame();
                }
                // 开始游戏（Enter键）
                if (e.code === 'Enter' && gameState === 'start') {
                    e.preventDefault();
                    startGame();
                }
                // 从暂停恢复（Enter键）
                if (e.code === 'Enter' && gameState === 'paused') {
                    e.preventDefault();
                    resumeGame();
                }
            });
            document.addEventListener('keyup', e => {
                const kl = (typeof e.key === 'string') ? e.key.toLowerCase() : '';
                if (kl) keys[kl] = false;
                keys[e.code] = false;
            });

            // ==================== 触摸控制 ====================
            document.querySelectorAll('.touch-btn').forEach(btn => {
                btn.addEventListener('pointerdown', e => {
                    e.preventDefault();
                    const key = btn.dataset.key;
                    if (key === ' ') {
                        keys[' '] = true;
                    } else {
                        keys[key] = true;
                    }
                });
                btn.addEventListener('pointerup', e => {
                    e.preventDefault();
                    const key = btn.dataset.key;
                    if (key === ' ') {
                        keys[' '] = false;
                    } else {
                        keys[key] = false;
                    }
                });
                btn.addEventListener('pointerleave', e => {
                    const key = btn.dataset.key;
                    if (key === ' ') {
                        keys[' '] = false;
                    } else {
