                    }
                });
            });

            // ==================== 按钮事件 ====================
            btnStart.addEventListener('click', () => startGame());
            btnRestart.addEventListener('click', () => restartGame());
            btnResume.addEventListener('click', () => resumeGame());
            // 点击暂停遮罩空白区域也能恢复
            pauseOverlay.addEventListener('click', (e) => {
                if (e.target === pauseOverlay) resumeGame();
            });

            // ==================== 地图生成 ====================
            function generateMap() {
                map = [];
                for (let row = 0; row < ROWS; row++) {
                    map[row] = [];
                    for (let col = 0; col < COLS; col++) {
                        map[row][col] = EMPTY;
                    }
                }

                // 放置基地（底部中央）
                const baseCol = Math.floor(COLS / 2);
                map[ROWS - 1][baseCol] = BASE;
                map[ROWS - 1][baseCol - 1] = BRICK;
                map[ROWS - 1][baseCol + 1] = BRICK;
                map[ROWS - 2][baseCol] = BRICK;
                map[ROWS - 2][baseCol - 1] = BRICK;
                map[ROWS - 2][baseCol + 1] = BRICK;

                // 随机生成墙壁
                const brickDensity = 0.18 + level * 0.02;
                const steelDensity = 0.04 + level * 0.01;
                const waterDensity = 0.03;
                const treeDensity = 0.06;

                for (let row = 1; row < ROWS - 3; row++) {
                    for (let col = 0; col < COLS; col++) {
                        // 保持出生点空旷
                        if (row <= 2 && (col <= 1 || col >= COLS - 2)) continue;
                        if (row <= 1 && col === Math.floor(COLS / 2)) continue;
                        // 保持基地周围空旷
                        if (row >= ROWS - 4 && Math.abs(col - baseCol) <= 2) continue;

                        const rand = Math.random();
                        if (rand < brickDensity) {
                            map[row][col] = BRICK;
                        } else if (rand < brickDensity + steelDensity) {
                            map[row][col] = STEEL;
                        } else if (rand < brickDensity + steelDensity + waterDensity) {
                            map[row][col] = WATER;
                        } else if (rand < brickDensity + steelDensity + waterDensity + treeDensity) {
                            map[row][col] = TREE;
                        }
                    }
                }

                // 确保出生点完全空旷
                for (let row = 0; row < 2; row++) {
                    for (let col = 0; col < 2; col++) {
                        map[row][col] = EMPTY;
                        map[row][COLS - 1 - col] = EMPTY;
                    }
                }
                map[0][Math.floor(COLS / 2)] = EMPTY;
                map[1][Math.floor(COLS / 2)] = EMPTY;
            }

            // ==================== 坦克类 ====================
            class Tank {
                constructor(x, y, direction, type = 'player', color = '#4ecdc4') {
                    this.x = x;
                    this.y = y;
                    this.direction = direction;
                    this.type = type; // 'player' | 'basic' | 'fast' | 'heavy' | 'smart'
                    this.color = color;
                    this.size = TANK_SIZE;
                    this.half = TANK_HALF;
                    this.speed = type === 'fast' ? 2.5 : type === 'heavy' ? 1.0 : 1.8;
                    this.alive = true;
                    this.shootCooldown = 0;
                    this.shootDelay = type === 'player' ? 20 : type === 'fast' ? 50 : type === 'heavy' ? 80 : 60;
                    this.health = type === 'heavy' ? 2 : 1;
                    this.bobAngle = Math.random() * Math.PI * 2;
                    this.flashTimer = 0;

                    // AI 相关
                    this.aiTimer = 0;
                    this.aiChangeDir = 60 + Math.floor(Math.random() * 80);
                    this.aiShootChance = type === 'smart' ? 0.03 : 0.015;
                }

                getBounds() {
                    return {
                        left: this.x - this.half,
                        top: this.y - this.half,
                        right: this.x + this.half,
                        bottom: this.y + this.half,
                    };
                }

                collidesWithMap(dx, dy, skipTankCheck = false) {
                    const newX = this.x + dx;
                    const newY = this.y + dy;
                    const b = {
                        left: newX - this.half + 2,
                        top: newY - this.half + 2,
                        right: newX + this.half - 2,
                        bottom: newY + this.half - 2,
                    };

                    // 边界检查
                    if (b.left < 0 || b.right > WIDTH || b.top < 0 || b.bottom > HEIGHT) {
                        return true;
                    }

                    // 瓦片碰撞
                    const startCol = Math.floor(b.left / TILE_SIZE);
                    const endCol = Math.floor(b.right / TILE_SIZE);
                    const startRow = Math.floor(b.top / TILE_SIZE);
                    const endRow = Math.floor(b.bottom / TILE_SIZE);

                    for (let row = startRow; row <= endRow; row++) {
                        for (let col = startCol; col <= endCol; col++) {
                            if (row < 0 || row >= ROWS || col < 0 || col >= COLS) continue;
                            const tile = map[row][col];
                            if (tile === BRICK || tile === STEEL || tile === BASE) {
                                if (this.rectOverlapTile(b, col, row)) {
                                    return true;
                                }
                            }
                            if (tile === WATER && this.type !== 'player') {
                                if (this.rectOverlapTile(b, col, row)) {
                                    return true;
                                }
                            }
                        }
                    }

                    if (skipTankCheck) return false;

                    // 与其他坦克碰撞
                    if (this.type !== 'player') {
                        if (playerTank && playerTank.alive && this.tanksCollide(newX, newY, playerTank)) {
                            return true;
                        }
                        for (let i = 0; i < enemies.length; i++) {
                            const enemy = enemies[i];
                            if (enemy !== this && enemy.alive && this.tanksCollide(newX, newY, enemy)) {
                                return true;
                            }
                        }
                    } else {
                        for (let i = 0; i < enemies.length; i++) {
                            const enemy = enemies[i];
                            if (enemy.alive && this.tanksCollide(newX, newY, enemy)) {
                                return true;
                            }
                        }
                    }

                    return false;
                }

                rectOverlapTile(b, col, row) {
                    const tl = col * TILE_SIZE;
                    const tt = row * TILE_SIZE;
                    const tr = tl + TILE_SIZE;
                    const tb = tt + TILE_SIZE;
                    return !(b.left >= tr || b.right <= tl || b.top >= tb || b.bottom <= tt);
                }

                tanksCollide(x, y, other) {
                    const dx = x - other.x;
                    const dy = y - other.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    return dist < this.half + other.half - 2;
                }

                rectsOverlap(a, b) {
                    return !(a.left >= b.right || a.right <= b.left || a.top >= b.bottom || a.bottom <= b.top);
                }

                update() {
                    if (!this.alive) return;
                    if (this.flashTimer > 0) this.flashTimer--;
                    if (this.shootCooldown > 0) this.shootCooldown--;
                    this.bobAngle += 0.05;
                }

                move(dx, dy, newDir) {
                    if (!this.alive) return;
                    this.direction = newDir;
                    if (!this.collidesWithMap(dx, dy)) {
                        this.x += dx;
                        this.y += dy;

                        // 在水中减速
                        const col = Math.floor(this.x / TILE_SIZE);
                        const row = Math.floor(this.y / TILE_SIZE);
                        if (row >= 0 && row < ROWS && col >= 0 && col < COLS && map[row][col] === WATER) {
                            // 已经减速（玩家可以通过水但很慢）
                        }
                    }
                }

                shoot() {
                    if (!this.alive || this.shootCooldown > 0) return null;
                    this.shootCooldown = this.shootDelay;
                    let bx = this.x;
                    let by = this.y;
                    // 炮管尖端约43px（turretSize10 + barrelLen18 + 制退器5 + 余量）
                    const offset = 38;
                    switch (this.direction) {
                        case UP: by -= offset; break;
                        case DOWN: by += offset; break;
                        case LEFT: bx -= offset; break;
                        case RIGHT: bx += offset; break;
                    }
                    const bullet = new Bullet(bx, by, this.direction, this.type === 'player');
                    if (this.type === 'player') sfxShoot();
                    return bullet;
                }

                hit() {
                    this.health--;
                    this.flashTimer = 8;
                    if (this.health <= 0) {
                        this.alive = false;
                        return true; // 被摧毁
                    }
                    return false; // 受伤但存活
                }

                draw(ctx) {
                    if (!this.alive) return;
                    if (this.flashTimer > 0 && this.flashTimer % 2 === 0) return;

                    ctx.save();
                    try {
                    ctx.translate(this.x, this.y);
                    const angles = [0, Math.PI / 2, Math.PI, -Math.PI / 2];
                    ctx.rotate(angles[this.direction]);

                    const s = this.size;   // 32
                    const h = s / 2;        // 16

                    // ═══════ 履带系统 ═══════
                    const tw = 4; // 履带宽度
                    // 左履带外框
                    ctx.fillStyle = '#1a1a1a';
                    ctx.fillRect(-h, -h + 1, tw, s - 2);      // 左履带
                    ctx.fillRect(h - tw, -h + 1, tw, s - 2);   // 右履带

                    // 负重轮（每侧6个）
                    const wheelR = 2.5;
                    const wheelSpacing = (s - 4) / 5;
                    for (let i = 0; i < 6; i++) {
                        const wy = -h + 4 + i * wheelSpacing;
                        // 左轮
                        ctx.fillStyle = '#2a2a2a';
                        ctx.beginPath(); ctx.arc(-h + tw / 2, wy, wheelR, 0, Math.PI * 2); ctx.fill();
                        ctx.strokeStyle = '#444'; ctx.lineWidth = 0.8;
                        ctx.beginPath(); ctx.arc(-h + tw / 2, wy, wheelR, 0, Math.PI * 2); ctx.stroke();
                        // 右轮
                        ctx.fillStyle = '#2a2a2a';
                        ctx.beginPath(); ctx.arc(h - tw / 2, wy, wheelR, 0, Math.PI * 2); ctx.fill();
                        ctx.strokeStyle = '#444'; ctx.lineWidth = 0.8;
                        ctx.beginPath(); ctx.arc(h - tw / 2, wy, wheelR, 0, Math.PI * 2); ctx.stroke();
                    }

                    // 驱动轮/诱导轮（首尾各一颗大轮）
                    ctx.fillStyle = '#333';
                    ctx.beginPath(); ctx.arc(-h + tw / 2, -h + 3, 3.5, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(-h + tw / 2, h - 3, 3.5, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(h - tw / 2, -h + 3, 3.5, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(h - tw / 2, h - 3, 3.5, 0, Math.PI * 2); ctx.fill();

                    // 履带纹理（横纹）
                    ctx.strokeStyle = '#111';
                    ctx.lineWidth = 0.5;
                    for (let i = 0; i < 12; i++) {
                        const ty = -h + 2 + i * (s - 4) / 11;
                        ctx.beginPath(); ctx.moveTo(-h, ty); ctx.lineTo(-h + tw, ty); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(h - tw, ty); ctx.lineTo(h, ty); ctx.stroke();
                    }

                    // ═══════ 车体 ═══════
                    const bx = tw + 1, bw = s - 2 * tw - 2;
                    const by = -h + 3, bh = s - 14;

                    // 车体主体
                    const hullGrad = ctx.createLinearGradient(0, by, 0, by + bh);
                    hullGrad.addColorStop(0, this.lightenColor(this.color, 0.15));
                    hullGrad.addColorStop(0.5, this.color);
                    hullGrad.addColorStop(1, this.darkenColor(this.color, 0.2));
                    ctx.fillStyle = hullGrad;
                    // 多边形车体——前部倾斜
                    ctx.beginPath();
                    ctx.moveTo(bx, by + bh);                        // 左下
                    ctx.lineTo(bx, by + 3);                          // 左上
                    ctx.lineTo(bx + 2, by);                          // 前斜面顶
                    ctx.lineTo(bx + bw - 2, by);                     // 右斜面顶
                    ctx.lineTo(bx + bw, by + 3);                     // 右上
                    ctx.lineTo(bx + bw, by + bh);                    // 右下
                    ctx.closePath();
                    ctx.fill();
                    ctx.strokeStyle = this.darkenColor(this.color, 0.35);
                    ctx.lineWidth = 1.2;
                    ctx.stroke();

                    // 发动机舱盖（后方）
                    ctx.fillStyle = this.darkenColor(this.color, 0.15);
                    ctx.fillRect(bx + 1, by + bh - 5, bw - 2, 5);
                    // 格栅线
                    ctx.strokeStyle = this.darkenColor(this.color, 0.3);
                    ctx.lineWidth = 0.5;
                    for (let gx = bx + 3; gx < bx + bw - 2; gx += 3) {
                        ctx.beginPath(); ctx.moveTo(gx, by + bh - 5); ctx.lineTo(gx, by + bh); ctx.stroke();
                    }

                    // 侧裙板（车体侧面装甲）
                    ctx.fillStyle = this.darkenColor(this.color, 0.25);
                    ctx.fillRect(bx, by + 1, 1.5, bh - 1);
                    ctx.fillRect(bx + bw - 1.5, by + 1, 1.5, bh - 1);

                    // ═══════ 炮塔 ═══════
                    const turretSize = 10;
                    const tx = bx + 2;
                    const tcx = bx + bw / 2;
                    const tcy = by + 1;

                    // 炮塔基座
                    ctx.fillStyle = this.darkenColor(this.color, 0.1);
                    ctx.beginPath();
                    ctx.moveTo(tcx - turretSize, tcy + 2);
                    ctx.lineTo(tcx - turretSize + 1, tcy - turretSize + 2);
                    ctx.lineTo(tcx - 3, tcy - turretSize);
                    ctx.lineTo(tcx + 3, tcy - turretSize);
                    ctx.lineTo(tcx + turretSize - 1, tcy - turretSize + 2);
                    ctx.lineTo(tcx + turretSize, tcy + 2);
                    ctx.closePath();
                    ctx.fill();
                    ctx.strokeStyle = this.darkenColor(this.color, 0.35);
                    ctx.lineWidth = 1;
                    ctx.stroke();

                    // 指挥塔（右侧小圆盖）
                    ctx.fillStyle = this.darkenColor(this.color, 0.05);
                    ctx.beginPath();
                    ctx.arc(tcx + 3, tcy - turretSize + 3, 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = this.darkenColor(this.color, 0.3);
                    ctx.lineWidth = 0.7;
                    ctx.stroke();

                    // 炮长瞄准镜（小方块）
                    ctx.fillStyle = '#111';
                    ctx.fillRect(tcx - turretSize + 1, tcy - turretSize + 1, 2.5, 2.5);

                    // ═══════ 炮管 ═══════
                    const barrelLen = 18;
                    const barrelWidth = 3.5;
                    const bStart = tcy - turretSize;

                    // 炮管主体
                    ctx.fillStyle = this.darkenColor(this.color, 0.08);
                    ctx.fillRect(-barrelWidth / 2, bStart - barrelLen, barrelWidth, barrelLen);
                    ctx.strokeStyle = '#1a1a1a';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(-barrelWidth / 2, bStart - barrelLen, barrelWidth, barrelLen);

                    // 制退器（炮口）
                    ctx.fillStyle = '#222';
                    ctx.fillRect(-barrelWidth / 2 - 1.5, bStart - barrelLen - 3, barrelWidth + 3, 5);
                    ctx.strokeStyle = '#111';
                    ctx.lineWidth = 0.7;
                    ctx.strokeRect(-barrelWidth / 2 - 1.5, bStart - barrelLen - 3, barrelWidth + 3, 5);
                    // 制退器孔
                    ctx.fillStyle = '#111';
                    ctx.fillRect(-0.8, bStart - barrelLen - 3, 1.6, 5);

                    // 同轴机枪
                    ctx.fillStyle = '#1a1a1a';
                    ctx.fillRect(barrelWidth / 2 + 1, bStart - barrelLen + 3, 1.2, 5);

                    // ═══════ 细节 ═══════
                    // 天线（细长线）
                    ctx.strokeStyle = '#333';
                    ctx.lineWidth = 0.6;
                    ctx.beginPath();
                    ctx.moveTo(tcx + 5, tcy - turretSize + 1);
                    ctx.lineTo(tcx + 6, tcy - turretSize - 8);
                    ctx.stroke();
                    // 天线顶端小球
                    ctx.fillStyle = '#e74c3c';
                    ctx.beginPath();
                    ctx.arc(tcx + 6, tcy - turretSize - 9, 1, 0, Math.PI * 2);
                    ctx.fill();

                    // 备用油箱（车尾两侧）
                    ctx.fillStyle = this.darkenColor(this.color, 0.3);
                    ctx.fillRect(bx, by + bh - 2, 3, 4);
                    ctx.fillRect(bx + bw - 3, by + bh - 2, 3, 4);

                    // 烟雾弹发射器（炮塔前侧）
                    ctx.fillStyle = '#333';
                    for (let s = -1; s <= 1; s += 2) {
                        ctx.fillRect(tcx + s * 4 - 0.7, tcy - turretSize + 4, 1.4, 2.5);
                    }

                    // ═══════ 颜色覆盖层（区分阵营） ═══════
                    if (this.color.startsWith('#')) {
                        const r = parseInt(this.color.slice(1,3), 16);
                        const g = parseInt(this.color.slice(3,5), 16);
                        const b = parseInt(this.color.slice(5,7), 16);
                        ctx.fillStyle = `rgba(${r},${g},${b},0.15)`;
                        ctx.fillRect(bx, by, bw, bh);
                    }

                    } finally { ctx.restore(); }

                    // 生命值指示（仅重型坦克）
                    if (this.health > 1) {
                        ctx.fillStyle = '#ff4444';
                        const barWidth = 24;
                        const barHeight = 3;
                        const barX = this.x - barWidth / 2;
                        const barY = this.y - this.half - 10;
                        ctx.fillRect(barX, barY, barWidth, barHeight);
                        ctx.fillStyle = '#44ff44';
                        ctx.fillRect(barX, barY, barWidth * (this.health / 2), barHeight);
                    }
                }

                lightenColor(hex, factor) {
                    const r = parseInt(hex.slice(1, 3), 16);
                    const g = parseInt(hex.slice(3, 5), 16);
                    const b = parseInt(hex.slice(5, 7), 16);
                    const lr = Math.min(255, Math.floor(r + (255 - r) * factor));
                    const lg = Math.min(255, Math.floor(g + (255 - g) * factor));
                    const lb = Math.min(255, Math.floor(b + (255 - b) * factor));
                    return `rgb(${lr},${lg},${lb})`;
                }

                darkenColor(hex, factor) {
                    const r = parseInt(hex.slice(1, 3), 16);
                    const g = parseInt(hex.slice(3, 5), 16);
                    const b = parseInt(hex.slice(5, 7), 16);
                    const dr = Math.floor(r * (1 - factor));
                    const dg = Math.floor(g * (1 - factor));
                    const db = Math.floor(b * (1 - factor));
                    return `rgb(${dr},${dg},${db})`;
                }
            }

            // ==================== 子弹类 ====================
            class Bullet {
                constructor(x, y, direction, isPlayer) {
                    this.x = x;
                    this.y = y;
                    this.direction = direction;
                    this.isPlayer = isPlayer;
                    this.speed = isPlayer ? 6 : 4;
                    this.alive = true;
                    this.size = isPlayer ? 4 : 3;
                }

                update() {
                    if (!this.alive) return;
                    switch (this.direction) {
                        case UP:
                            this.y -= this.speed;
                            break;
                        case DOWN:
                            this.y += this.speed;
                            break;
                        case LEFT:
                            this.x -= this.speed;
                            break;
                        case RIGHT:
                            this.x += this.speed;
                            break;
                    }

                    // 边界检查
                    if (this.x < 0 || this.x > WIDTH || this.y < 0 || this.y > HEIGHT) {
                        this.alive = false;
                        return;
                    }

                    // 瓦片碰撞
                    const col = Math.floor(this.x / TILE_SIZE);
                    const row = Math.floor(this.y / TILE_SIZE);
                    if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
                        const tile = map[row][col];
                        if (tile === BRICK) {
                            map[row][col] = EMPTY;
                            this.alive = false;
                            spawnExplosion(col * TILE_SIZE + TILE_SIZE / 2, row * TILE_SIZE + TILE_SIZE / 2,
                                'small');
                            sfxHit();
                            return;
                        }
                        if (tile === STEEL) {
                            this.alive = false;
                            spawnExplosion(this.x, this.y, 'small');
                            sfxHit();
                            return;
                        }
                        if (tile === BASE) {
                            map[row][col] = EMPTY;
                            this.alive = false;
                            baseAlive = false;
                            spawnExplosion(col * TILE_SIZE + TILE_SIZE / 2, row * TILE_SIZE + TILE_SIZE / 2,
                                'large');
                            sfxExplosion();
                            return;
                        }
                    }
                }

                draw(ctx) {
                    if (!this.alive) return;
                    ctx.fillStyle = this.isPlayer ? '#ffff00' : '#ff6666';
                    ctx.shadowColor = this.isPlayer ? '#ffff00' : '#ff4444';
                    ctx.shadowBlur = 6;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;

                    // 拖尾效果
                    ctx.fillStyle = this.isPlayer ? 'rgba(255,255,200,0.6)' : 'rgba(255,150,150,0.6)';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size - 1, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // ==================== 爆炸效果 ====================
            class Explosion {
                constructor(x, y, type = 'small') {
                    this.x = x;
                    this.y = y;
                    this.type = type;
                    this.timer = type === 'large' ? 30 : 18;
                    this.maxTimer = this.timer;
                    this.particles = [];
                    const count = type === 'large' ? 20 : 10;
                    for (let i = 0; i < count; i++) {
                        const angle = Math.random() * Math.PI * 2;
                        const speed = (1 + Math.random() * 3) * (type === 'large' ? 2 : 1);
                        this.particles.push({
                            x: 0,
                            y: 0,
                            vx: Math.cos(angle) * speed,
                            vy: Math.sin(angle) * speed,
                            size: 2 + Math.random() * 4,
                            color: ['#ff4444', '#ff8800', '#ffcc00', '#ffffff'][Math.floor(Math.random() *
                                4)],
                        });
                    }
                }

                update() {
                    this.timer--;
                    for (const p of this.particles) {
                        p.x += p.vx;
                        p.y += p.vy;
                        p.vx *= 0.95;
                        p.vy *= 0.95;
                        p.size *= 0.95;
                    }
                    return this.timer > 0;
                }

                draw(ctx) {
                    const alpha = this.timer / this.maxTimer;
                    for (const p of this.particles) {
                        ctx.fillStyle = p.color.replace(')', `, ${alpha})`).replace('rgb',
                            'rgba');
                        if (p.color === '#ffffff') {
                            ctx.fillStyle = `rgba(255,255,255,${alpha})`;
                        }
                        ctx.beginPath();
                        ctx.arc(this.x + p.x, this.y + p.y, p.size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    // 中心光晕
                    const glowRadius = (this.maxTimer - this.timer) * (this.type === 'large' ? 3 : 1.5);
                    const glowAlpha = alpha * 0.5;
                    const glowGrad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, glowRadius);
                    glowGrad.addColorStop(0, `rgba(255,200,50,${glowAlpha})`);
                    glowGrad.addColorStop(1, `rgba(255,50,0,0)`);
                    ctx.fillStyle = glowGrad;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, glowRadius, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // ==================== 道具类 ====================
            class PowerUp {
                constructor(x, y, type) {
                    this.x = x;
                    this.y = y;
                    this.type = type; // 'speed' | 'rapid' | 'shield' | 'life'
                    this.alive = true;
                    this.timer = 600; // 10秒后消失
                    this.blinkTimer = 0;
                    this.size = 14;
                }

                update() {
                    this.timer--;
                    this.blinkTimer++;
                    if (this.timer < 120 && this.blinkTimer % 10 < 5) {
                        // 闪烁
                    }
                    if (this.timer <= 0) this.alive = false;
                }

                draw(ctx) {
                    if (!this.alive) return;
                    if (this.timer < 120 && Math.floor(this.blinkTimer / 10) % 2 === 0) return;

                    ctx.save();
                    try {
                    ctx.translate(this.x, this.y);

                    // 光晕
                    const glowGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, this.size + 4);
                    const typeColors = {
                        speed: [100, 200, 255],
                        rapid: [255, 180, 50],
                        shield: [100, 255, 100],
                        life: [255, 100, 150],
                    };
                    const tc = typeColors[this.type];
                    glowGrad.addColorStop(0, `rgba(${tc[0]},${tc[1]},${tc[2]},0.6)`);
                    glowGrad.addColorStop(1, `rgba(${tc[0]},${tc[1]},${tc[2]},0)`);
                    ctx.fillStyle = glowGrad;
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size + 6, 0, Math.PI * 2);
                    ctx.fill();

                    // 主体
                    const bodyGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, this.size);
                    bodyGrad.addColorStop(0, '#ffffff');
                    bodyGrad.addColorStop(0.7, `rgb(${tc[0]},${tc[1]},${tc[2]})`);
                    bodyGrad.addColorStop(0.7, rgbColor);
                    ctx.fillStyle = bodyGrad;
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    // 图标
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 14px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    const icons = { speed: '⚡', rapid: '🔥', shield: '🛡️', life: '❤️' };
                    ctx.fillText(icons[this.type], 0, 1);
                    } finally { ctx.restore(); }
                }

                apply(player) {
                    switch (this.type) {
                        case 'speed':
                            player.speed = Math.min(3.5, player.speed + 0.6);
                            setTimeout(() => { if (player.alive) player.speed = Math.max(1.8, player.speed -
                                    0.6); }, 8000);
                            break;
                        case 'rapid':
                            player.shootDelay = Math.max(6, player.shootDelay - 10);
                            player.shootCooldown = 0;
                            setTimeout(() => { if (player.alive) player.shootDelay = Math.min(30, player
                                    .shootDelay + 10); }, 8000);
                            break;
                        case 'shield':
                            player.health = Math.min(3, player.health + 1);
                            break;
                        case 'life':
                            lives = Math.min(5, lives + 1);
                            updateHUD();
                            break;
                    }
                }
            }

            // ==================== 辅助函数 ====================
            function spawnExplosion(x, y, type) {
                explosions.push(new Explosion(x, y, type));
                if (type === 'large') {
                    shakeTimer = 15;
                    shakeIntensity = 6;
                }
            }

            function spawnPowerUp(x, y) {
                if (Math.random() < 0.25) { // 25% 概率掉落道具
                    const types = ['speed', 'rapid', 'shield', 'life'];
                    const weights = [0.3, 0.3, 0.25, 0.15];
                    const rand = Math.random();
                    let cumulative = 0;
                    let type = types[0];
                    for (let i = 0; i < types.length; i++) {
                        cumulative += weights[i];
                        if (rand < cumulative) { type = types[i]; break; }
                    }
                    powerUps.push(new PowerUp(x, y, type));
                }
            }

            function updateHUD() {
                scoreDisplay.textContent = score;
                livesDisplay.textContent = lives;
                levelDisplay.textContent = level;
            }

            // ==================== 生成敌人 ====================
            function spawnEnemy() {
                if (enemiesSpawned >= totalEnemies) return null;

                const spawnPoints = [
                    { x: TILE_SIZE * 1.5, y: TILE_SIZE * 0.5 },
                    { x: WIDTH / 2, y: TILE_SIZE * 0.5 },
                    { x: WIDTH - TILE_SIZE * 1.5, y: TILE_SIZE * 0.5 },
                ];

                // 检查出生点是否为空
                const available = spawnPoints.filter(sp => {
                    const tooClose = enemies.some(e => e.alive && Math.abs(e.x - sp.x) < TANK_SIZE &&
                        Math.abs(e.y - sp.y) < TANK_SIZE);
                    if (tooClose) return false;
                    if (playerTank && playerTank.alive && Math.abs(playerTank.x - sp.x) < TANK_SIZE &&
                        Math.abs(playerTank.y - sp.y) < TANK_SIZE) return false;
                    return true;
                });

                if (available.length === 0) return null;

                const sp = available[Math.floor(Math.random() * available.length)];

                // 根据关卡选择敌人类型
                const typeRoll = Math.random();
                let type, color;
                if (level >= 4 && typeRoll < 0.2) {
                    type = 'heavy';
                    color = '#f39c12';
                } else if (level >= 3 && typeRoll < 0.4) {
                    type = 'smart';
                    color = '#9b59b6';
                } else if (level >= 2 && typeRoll < 0.6) {
                    type = 'fast';
                    color = '#3498db';
                } else {
                    type = 'basic';
                    color = '#e74c3c';
                }

                const enemy = new Tank(sp.x, sp.y, DOWN, type, color);
                enemies.push(enemy);
                enemiesSpawned++;
                return enemy;
            }

            function updateEnemyAI(enemy) {
                if (!enemy.alive) return;

                enemy.aiTimer++;

                // 智能坦克：有时会追踪玩家
                if (enemy.type === 'smart' && playerTank && playerTank.alive) {
                    if (enemy.aiTimer % 30 === 0 && Math.random() < 0.4) {
                        const dx = playerTank.x - enemy.x;
                        const dy = playerTank.y - enemy.y;
                        if (Math.abs(dx) > Math.abs(dy)) {
                            enemy.direction = dx > 0 ? RIGHT : LEFT;
                        } else {
                            enemy.direction = dy > 0 ? DOWN : UP;
                        }
                    }
                }

                // 定期改变方向
                if (enemy.aiTimer >= enemy.aiChangeDir) {
                    enemy.aiTimer = 0;
                    enemy.aiChangeDir = 40 + Math.floor(Math.random() * 100);
                    const dirs = [UP, RIGHT, DOWN, LEFT];
                    enemy.direction = dirs[Math.floor(Math.random() * 4)];
                }

                // 如果前方有障碍，改变方向
                const checkDirs = [enemy.direction, ...shuffleArray([UP, RIGHT, DOWN, LEFT].filter(d => d !== enemy
                    .direction))];
                let moved = false;
                for (const dir of checkDirs) {
                    const speed = enemy.speed;
                    let dx = 0,
                        dy = 0;
                    switch (dir) {
                        case UP:
                            dy = -speed;
                            break;
                        case DOWN:
                            dy = speed;
                            break;
                        case LEFT:
                            dx = -speed;
                            break;
                        case RIGHT:
                            dx = speed;
                            break;
                    }
                    enemy.direction = dir;
                    if (!enemy.collidesWithMap(dx, dy)) {
                        enemy.x += dx;
                        enemy.y += dy;
                        moved = true;
                        break;
                    }
                }
                if (!moved) {
                    // 卡住了，随机选择一个可行方向
                    enemy.aiChangeDir = 20 + Math.floor(Math.random() * 30);
                }

                // 随机射击
                if (Math.random() < enemy.aiShootChance) {
                    const bullet = enemy.shoot();
                    if (bullet) bullets.push(bullet);
                }

                // 前方有玩家时射击概率提高
                if (playerTank && playerTank.alive) {
                    const dx = playerTank.x - enemy.x;
                    const dy = playerTank.y - enemy.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    // 检查是否在射击线上
                    const aligned = (enemy.direction === UP && dy < 0 && Math.abs(dx) < TANK_SIZE) ||
                        (enemy.direction === DOWN && dy > 0 && Math.abs(dx) < TANK_SIZE) ||
                        (enemy.direction === LEFT && dx < 0 && Math.abs(dy) < TANK_SIZE) ||
                        (enemy.direction === RIGHT && dx > 0 && Math.abs(dy) < TANK_SIZE);
                    if (aligned && dist < 400 && Math.random() < 0.08) {
                        const bullet = enemy.shoot();
                        if (bullet) bullets.push(bullet);
                    }
                }
            }

            function shuffleArray(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

            // ==================== 碰撞检测 ====================
            // 推开重叠的坦克（防止互相卡死）
            let overlapResolvePass = 0;
            function clampTank(tank) {
                if (tank.x - tank.half < 0) tank.x = tank.half;
                if (tank.x + tank.half > WIDTH) tank.x = WIDTH - tank.half;
                if (tank.y - tank.half < 0) tank.y = tank.half;
                if (tank.y + tank.half > HEIGHT) tank.y = HEIGHT - tank.half;
            }

            function resolveTankOverlaps() {
                overlapResolvePass = (overlapResolvePass + 1) % 3;
                // 玩家 vs 敌人
                if (playerTank && playerTank.alive) {
                    for (const enemy of enemies) {
                        if (!enemy.alive) continue;
                        const dx = playerTank.x - enemy.x;
                        const dy = playerTank.y - enemy.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const minDist = playerTank.half + enemy.half;
                        if (dist < minDist && dist > 0.001) {
                            const nx = dx / dist;
                            const ny = dy / dist;
                            const push = (minDist - dist) / 2 + 1;
                            playerTank.x += nx * push;
                            playerTank.y += ny * push;
                            enemy.x -= nx * push;
                            enemy.y -= ny * push;
                            clampTank(playerTank);
                            clampTank(enemy);
                        } else if (dist < 0.001) {
                            playerTank.x += 2;
                            enemy.x -= 2;
                            clampTank(playerTank);
                            clampTank(enemy);
                        }
                    }
                }
                // 敌人之间（每3帧处理一次，减少开销）
                if (overlapResolvePass === 0) {
                    for (let i = 0; i < enemies.length; i++) {
                        if (!enemies[i].alive) continue;
                        for (let j = i + 1; j < enemies.length; j++) {
                            if (!enemies[j].alive) continue;
                            const dx = enemies[i].x - enemies[j].x;
                            const dy = enemies[i].y - enemies[j].y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            const minDist = enemies[i].half + enemies[j].half;
                            if (dist < minDist && dist > 0.001) {
                                const nx = dx / dist;
                                const ny = dy / dist;
                                const push = (minDist - dist) / 2 + 1;
                                enemies[i].x += nx * push;
                                enemies[i].y += ny * push;
                                enemies[j].x -= nx * push;
                                enemies[j].y -= ny * push;
                                clampTank(enemies[i]);
                                clampTank(enemies[j]);
                            }
                        }
                    }
                }
            }

            function checkBulletTankCollision(bullet, tank) {
                const dx = bullet.x - tank.x;
                const dy = bullet.y - tank.y;
                return Math.sqrt(dx * dx + dy * dy) < tank.half + bullet.size;
            }

            function checkPlayerPowerUpCollision(player, powerUp) {
                const dx = player.x - powerUp.x;
                const dy = player.y - powerUp.y;
                return Math.sqrt(dx * dx + dy * dy) < player.half + powerUp.size;
            }

            // ==================== 游戏循环 ====================
            function update() {
                if (gameState !== 'playing') return;

                audioCallsThisFrame = 0;

                // 更新震屏
                if (shakeTimer > 0) shakeTimer--;

                // 更新玩家
                if (playerTank && playerTank.alive) {
                    playerTank.update();

                    // 移动
                    let dx = 0,
                        dy = 0;
                    let newDir = playerTank.direction;
                    const speed = playerTank.speed;

                    if (keys['ArrowUp'] || keys['KeyW'] || keys['w'] || keys['W'] || keys['ArrowUp']) {
                        dy = -speed;
                        newDir = UP;
                    } else if (keys['ArrowDown'] || keys['KeyS'] || keys['s'] || keys['S']) {
                        dy = speed;
                        newDir = DOWN;
                    } else if (keys['ArrowLeft'] || keys['KeyA'] || keys['a'] || keys['A']) {
                        dx = -speed;
                        newDir = LEFT;
                    } else if (keys['ArrowRight'] || keys['KeyD'] || keys['d'] || keys['D']) {
                        dx = speed;
                        newDir = RIGHT;
                    }

                    if (dx !== 0 || dy !== 0) {
                        playerTank.move(dx, dy, newDir);
                    }

                    // 射击
                    if ((keys[' '] || keys['Space'] || keys['KeyJ'] || keys['j'] || keys['J']) && playerTank
                        .shootCooldown <= 0) {
                        const bullet = playerTank.shoot();
                        if (bullet) bullets.push(bullet);
                    }
                }

                // 解决重叠（重帧时跳过以保流畅）
                if (!heavyFrame) resolveTankOverlaps();

                // 更新敌人（上限保护）
                let enemyUpdateCount = 0;
                for (const enemy of enemies) {
                    if (!enemy.alive) continue;
                    if (enemyUpdateCount >= 25) break;
                    enemyUpdateCount++;
                    enemy.update();
                    updateEnemyAI(enemy);
                }

                // 敌人移动后再次检查重叠
                if (!heavyFrame) resolveTankOverlaps();

                // 更新子弹
                for (const bullet of bullets) {
                    bullet.update();
                }

                // 更新爆炸
                for (const exp of explosions) {
                    exp.update();
                }

                // 更新道具
                for (const pu of powerUps) {
                    pu.update();
                }

                // ═══ 子弹碰撞检测（上限保护） ═══
                let bulletCheckCount = 0;
                const MAX_BULLET_CHECKS = 200;
                for (let i = bullets.length - 1; i >= 0 && bulletCheckCount < MAX_BULLET_CHECKS; i--) {
                    bulletCheckCount++;
                    const bullet = bullets[i];
                    if (!bullet.alive) {
                        bullets.splice(i, 1);
                        continue;
                    }

                    let hit = false;

                    if (bullet.isPlayer) {
                        // 玩家子弹 vs 敌人（跳过已死的）
                        for (let j = enemies.length - 1; j >= 0; j--) {
                            const enemy = enemies[j];
                            if (!enemy.alive) continue; // 打不死已死的敌人
                            if (checkBulletTankCollision(bullet, enemy)) {
                                const destroyed = enemy.hit();
                                bullet.alive = false;
                                hit = true;
                                if (destroyed) {
                                    if (explosions.length < 40) spawnExplosion(enemy.x, enemy.y, 'large');
                                    spawnPowerUp(enemy.x, enemy.y);
                                    enemiesRemaining--;
                                    const points = enemy.type === 'heavy' ? 300 : enemy.type === 'smart' ?
                                        200 : enemy.type === 'fast' ? 150 : 100;
                                    score += points;
                                    updateHUD();
                                } else {
                                    if (explosions.length < 40) spawnExplosion(bullet.x, bullet.y, 'small');
                                }
                                break;
                            }
                        }
                    } else {
                        // 敌人子弹 vs 玩家
                        if (playerTank && playerTank.alive && checkBulletTankCollision(bullet, playerTank)) {
                            const destroyed = playerTank.hit();
                            bullet.alive = false;
                            hit = true;
                            if (destroyed) {
                                if (explosions.length < 40) spawnExplosion(playerTank.x, playerTank.y, 'large');
                                lives--;
                                updateHUD();
                                if (lives <= 0) {
                                    endGame(false);
                                    return;
                                }
                                respawnPlayer();
                            } else {
                                if (explosions.length < 40) spawnExplosion(bullet.x, bullet.y, 'small');
                            }
                        }
                    }

                    if (hit) {
                        bullets.splice(i, 1);
                    }
                }
                // 子弹上限
                if (bullets.length > 80) bullets = bullets.slice(-60);

                // 清理死亡敌人（保留有闪动效果的）
                enemies = enemies.filter(e => e.alive || e.flashTimer > 0);
                // 敌人上限安全网
                if (enemies.length > 30) enemies = enemies.slice(0, 25);

                // 清理过期爆炸
                explosions = explosions.filter(e => e.timer > 0);
                if (explosions.length > 30) explosions = explosions.slice(-20);

                // 清理过期道具
                powerUps = powerUps.filter(p => p.alive);
                if (powerUps.length > 15) powerUps = powerUps.slice(-10);

                // 道具碰撞
                if (playerTank && playerTank.alive) {
                    for (let i = powerUps.length - 1; i >= 0; i--) {
                        if (checkPlayerPowerUpCollision(playerTank, powerUps[i])) {
                            powerUps[i].apply(playerTank);
                            sfxPowerUp();
                            powerUps.splice(i, 1);
                        }
                    }
                }

                // 敌人出生
                if (enemiesRemaining > 0 && enemies.filter(e => e.alive).length < 4) {
                    enemySpawnTimer++;
                    if (enemySpawnTimer >= enemySpawnInterval) {
                        enemySpawnTimer = 0;
                        spawnEnemy();
                    }
                }

                // 检查基地
                if (!baseAlive) {
                    endGame(false);
                    return;
                }

                // 检查胜利条件
                if (enemiesRemaining <= 0 && enemies.filter(e => e.alive).length === 0) {
                    nextLevel();
                }
            }

            function render() {
                // 先用 setTransform 重置矩阵（防栈泄漏的核心）
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                try {
                let shakeX = 0, shakeY = 0;
                if (shakeTimer > 0) {
                    shakeX = (Math.random() - 0.5) * shakeIntensity * (shakeTimer / 15);
                    shakeY = (Math.random() - 0.5) * shakeIntensity * (shakeTimer / 15);
                }
                ctx.setTransform(1, 0, 0, 1, shakeX, shakeY);
                ctx.clearRect(-shakeX, -shakeY, WIDTH + 4, HEIGHT + 4);

                // 绘制地图
                for (let row = 0; row < ROWS; row++) {
                    for (let col = 0; col < COLS; col++) {
                        const x = col * TILE_SIZE;
                        const y = row * TILE_SIZE;
                        const tile = map[row][col];

                        if (tile === BRICK) {
                            drawBrick(x, y);
                        } else if (tile === STEEL) {
                            drawSteel(x, y);
                        } else if (tile === WATER) {
                            drawWater(x, y);
                        } else if (tile === TREE) {
                            ctx.fillStyle = '#1a1a1a';
                            ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                        } else if (tile === BASE) {
                            drawBase(x, y);
                        } else {
                            // 地面
                            ctx.fillStyle = '#1a1a1a';
                            ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                            // 网格线
                            ctx.strokeStyle = 'rgba(255,255,255,0.03)';
                            ctx.lineWidth = 0.5;
                            ctx.strokeRect(x, y, TILE_SIZE, TILE_SIZE);
                        }
                    }
                }

                // 绘制道具
                for (const pu of powerUps) {
                    pu.draw(ctx);
                }

                // 绘制子弹
                for (const bullet of bullets) {
                    bullet.draw(ctx);
                }

                // 绘制敌人
                for (const enemy of enemies) {
                    enemy.draw(ctx);
                }

                // 绘制玩家
                if (playerTank && playerTank.alive) {
                    playerTank.draw(ctx);
                }

                // 绘制树（在坦克上方，形成遮挡效果）
                for (let row = 0; row < ROWS; row++) {
                    for (let col = 0; col < COLS; col++) {
                        if (map[row][col] === TREE) {
                            drawTree(col * TILE_SIZE, row * TILE_SIZE);
                        }
                    }
                }

                // 绘制爆炸
                for (const exp of explosions) {
                    exp.draw(ctx);
                }

                ctx.setTransform(1, 0, 0, 1, 0, 0); // 重置变换

                // 绘制小地图
                drawMinimap();

                // 敌人剩余指示
                ctx.fillStyle = '#888';
                ctx.font = 'bold 11px "Microsoft YaHei", sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText(`剩余敌人: ${enemiesRemaining}`, WIDTH - 16, HEIGHT - 10);
                } catch (e) {
                    // 渲染异常时确保变换重置
                    ctx.setTransform(1, 0, 0, 1, 0, 0);
                }
            }

            function drawBrick(x, y) {
                // 砖墙主体
                ctx.fillStyle = '#c67a3a';
                ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);

                // 砖块纹理
                ctx.strokeStyle = '#8b4513';
                ctx.lineWidth = 1;
                const brickH = TILE_SIZE / 4;
                const brickW = TILE_SIZE / 2;
                for (let row = 0; row < 4; row++) {
                    const offsetX = row % 2 === 0 ? 0 : brickW / 2;
                    for (let col = -1; col < 2; col++) {
                        ctx.strokeRect(x + offsetX + col * brickW, y + row * brickH, brickW, brickH);
                    }
                }

                // 高光
                ctx.fillStyle = 'rgba(255,255,255,0.08)';
                ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE / 2);
            }

            function drawSteel(x, y) {
                // 钢铁主体
                const grad = ctx.createLinearGradient(x, y, x + TILE_SIZE, y + TILE_SIZE);
                grad.addColorStop(0, '#7f8c8d');
                grad.addColorStop(0.3, '#bdc3c7');
                grad.addColorStop(0.5, '#95a5a6');
                grad.addColorStop(0.7, '#bdc3c7');
                grad.addColorStop(1, '#7f8c8d');
                ctx.fillStyle = grad;
                ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);

                // 铆钉
                ctx.fillStyle = '#555';
                const margin = 6;
                [
                    [margin, margin],
                    [TILE_SIZE - margin - 3, margin],
                    [margin, TILE_SIZE - margin - 3],
                    [TILE_SIZE - margin - 3, TILE_SIZE - margin - 3]
                ].forEach(([rx, ry]) => {
                    ctx.beginPath();
                    ctx.arc(x + rx, y + ry, 3, 0, Math.PI * 2);
                    ctx.fill();
                });

                // 边框
                ctx.strokeStyle = '#555';
                ctx.lineWidth = 2;
                ctx.strokeRect(x + 2, y + 2, TILE_SIZE - 4, TILE_SIZE - 4);
            }

            function drawWater(x, y) {
                const time = frameCount * 0.016; // 模拟时间（基于帧计数）
                const grad = ctx.createLinearGradient(x, y, x, y + TILE_SIZE);
                grad.addColorStop(0, '#1a5276');
                grad.addColorStop(0.5, '#2980b9');
                grad.addColorStop(1, '#1a5276');
                ctx.fillStyle = grad;
                ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);

                // 波浪动画
                ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                ctx.lineWidth = 1.5;
                for (let i = 0; i < 3; i++) {
                    const waveY = y + TILE_SIZE * (0.2 + i * 0.3);
                    ctx.beginPath();
                    for (let wx = 0; wx < TILE_SIZE; wx += 2) {
                        const wy = waveY + Math.sin((wx + time * 40 + i) * 0.15) * 3;
                        if (wx === 0) ctx.moveTo(x + wx, wy);
                        else ctx.lineTo(x + wx, wy);
                    }
                    ctx.stroke();
                }
            }

            function drawTree(x, y) {
                // 树干
                ctx.fillStyle = '#5d4e37';
                ctx.fillRect(x + TILE_SIZE / 2 - 3, y + TILE_SIZE / 2, 6, TILE_SIZE / 2);

                // 树冠
                ctx.fillStyle = '#1a7a2e';
                ctx.beginPath();
                ctx.arc(x + TILE_SIZE / 2, y + TILE_SIZE / 3, TILE_SIZE / 2.5, 0, Math.PI * 2);
                ctx.fill();

                // 树冠高光
                ctx.fillStyle = 'rgba(100,200,100,0.3)';
                ctx.beginPath();
                ctx.arc(x + TILE_SIZE / 2 - 3, y + TILE_SIZE / 3 - 2, TILE_SIZE / 4.5, 0, Math.PI * 2);
                ctx.fill();
            }

            function drawBase(x, y) {
                // 基地（鹰徽）
                ctx.fillStyle = '#2c2c2c';
                ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);

                // 鹰的简化图案
                const cx = x + TILE_SIZE / 2;
                const cy = y + TILE_SIZE / 2;

                // 底座
                ctx.fillStyle = '#555';
                ctx.fillRect(cx - 10, cy + 4, 20, 8);

                // 鹰身
                ctx.fillStyle = '#f5c842';
                ctx.beginPath();
                ctx.moveTo(cx, cy - 12);
                ctx.lineTo(cx - 6, cy - 2);
                ctx.lineTo(cx - 10, cy + 4);
                ctx.lineTo(cx, cy);
                ctx.lineTo(cx + 10, cy + 4);
                ctx.lineTo(cx + 6, cy - 2);
                ctx.closePath();
                ctx.fill();

                // 鹰头
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(cx, cy - 10, 4, 0, Math.PI * 2);
                ctx.fill();
            }

            function drawMinimap() {
                const mmSize = 90;
                const mmX = WIDTH - mmSize - 8;
                const mmY = 8;
                const cellW = mmSize / COLS;
                const cellH = mmSize / ROWS;

                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(mmX - 2, mmY - 2, mmSize + 4, mmSize + 4);
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 1;
                ctx.strokeRect(mmX - 2, mmY - 2, mmSize + 4, mmSize + 4);

                for (let row = 0; row < ROWS; row++) {
                    for (let col = 0; col < COLS; col++) {
                        const tile = map[row][col];
                        if (tile === BRICK) ctx.fillStyle = '#c67a3a';
                        else if (tile === STEEL) ctx.fillStyle = '#95a5a6';
                        else if (tile === WATER) ctx.fillStyle = '#2980b9';
                        else if (tile === BASE) ctx.fillStyle = '#f5c842';
                        else if (tile === TREE) ctx.fillStyle = '#1a7a2e';
                        else ctx.fillStyle = 'transparent';

                        if (tile !== EMPTY) {
                            ctx.fillRect(mmX + col * cellW, mmY + row * cellH, cellW, cellH);
                        }
                    }
                }

                // 玩家位置
                if (playerTank && playerTank.alive) {
                    const px = mmX + (playerTank.x / WIDTH) * mmSize;
                    const py = mmY + (playerTank.y / HEIGHT) * mmSize;
                    ctx.fillStyle = '#4ecdc4';
                    ctx.beginPath();
                    ctx.arc(px, py, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                }

                // 敌人位置
                for (const enemy of enemies) {
                    if (enemy.alive) {
                        const ex = mmX + (enemy.x / WIDTH) * mmSize;
                        const ey = mmY + (enemy.y / HEIGHT) * mmSize;
                        ctx.fillStyle = '#e74c3c';
                        ctx.fillRect(ex - 1.5, ey - 1.5, 3, 3);
                    }
                }

                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.font = '8px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('小地图', mmX + mmSize / 2, mmY - 5);
            }

            function gameLoop() {
                frameCount++;
                const now = performance.now();
                heavyFrame = (lastFrameTime > 0 && now - lastFrameTime > 80); // 上帧耗时>80ms则标记
                lastFrameTime = now;
                try {
                    if (gameState === 'playing') {
                        update();
                    }
                    render();
                } catch (e) {
                    console.error('游戏循环错误:', e);
                }
                requestAnimationFrame(gameLoop);
            }

            // ==================== 游戏流程 ====================
            function initLevel() {
                generateMap();
                enemies = [];
                bullets = [];
                explosions = [];
                powerUps = [];
                baseAlive = true;
                enemySpawnTimer = 0;
                enemySpawnInterval = Math.max(60, 180 - level * 15);
                enemiesRemaining = totalEnemies;
                enemiesSpawned = 0;
                shakeTimer = 0;
                shakeIntensity = 0;

                // 创建玩家坦克
                const playerX = WIDTH / 2;
                const playerY = HEIGHT - TILE_SIZE * 3.5;
                playerTank = new Tank(playerX, playerY, UP, 'player', '#4ecdc4');
                playerTank.speed = 1.8;

                // 初始生成一些敌人
                for (let i = 0; i < Math.min(3, totalEnemies); i++) {
                    spawnEnemy();
                }

                updateHUD();
            }

            function startGame() {
                initAudio();
                score = 0;
                lives = 3;
                level = 1;
                totalEnemies = enemiesPerLevel;
                gameState = 'playing';
                startOverlay.classList.remove('active');
                gameOverOverlay.classList.remove('active');
                pauseOverlay.classList.remove('active');
                initLevel();
                updateHUD();
                battleMusic.start();
            }

            function restartGame() {
                initAudio();
                score = 0;
                lives = 3;
                level = 1;
                totalEnemies = enemiesPerLevel;
                gameState = 'playing';
                gameOverOverlay.classList.remove('active');
                pauseOverlay.classList.remove('active');
                initLevel();
                updateHUD();
                battleMusic.stop();
                battleMusic.start();
            }

            function endGame(won) {
                gameState = 'gameover';
                battleMusic.stop();
                if (won) {
                    gameOverTitle.textContent = '🎉 恭喜通关！';
                    gameOverSubtitle.innerHTML = `最终得分: <b style="color:#f5c842;font-size:1.5rem;">${score}</b><br>到达关卡: ${level}`;
                } else {
                    gameOverTitle.textContent = '💥 游戏结束';
                    gameOverSubtitle.innerHTML = `得分: <b style="color:#f5c842;font-size:1.3rem;">${score}</b><br>到达关卡: ${level}`;
                }
                gameOverOverlay.classList.add('active');
                sfxGameOver();
            }

            function nextLevel() {
                level++;
                totalEnemies = enemiesPerLevel + (level - 1) * 2;
                sfxLevelUp();
                initLevel();
                updateHUD();
            }

            function respawnPlayer() {
                // 短暂无敌后重生
                const playerX = WIDTH / 2;
                const playerY = HEIGHT - TILE_SIZE * 3.5;
                playerTank = new Tank(playerX, playerY, UP, 'player', '#4ecdc4');
                playerTank.flashTimer = 60; // 1秒无敌时间
                playerTank.speed = 1.8;
            }

            function togglePause() {
                if (gameState === 'playing') {
                    gameState = 'paused';
                    pauseOverlay.classList.add('active');
                    battleMusic.pause();
                } else if (gameState === 'paused') {
                    resumeGame();
                }
            }

            function resumeGame() {
                gameState = 'playing';
                pauseOverlay.classList.remove('active');
                battleMusic.resume();
            }

            // 检测是否为移动设备
            function isMobile() {
                return 'ontouchstart' in window || navigator.maxTouchPoints > 0;
            }

            if (isMobile()) {
                touchControls.style.display = 'flex';
            }

            // ==================== 启动 ====================
            function init() {
                generateMap();
                // 初始渲染（无玩家坦克）
                playerTank = new Tank(WIDTH / 2, HEIGHT - TILE_SIZE * 3.5, UP, 'player', '#4ecdc4');
                render();
                // 显示开始画面
                startOverlay.classList.add('active');
            }

            init();
            gameLoop();

            console.log('🎮 坦克大战已就绪！');
            console.log('   ↑↓←→ / WASD - 移动');
            console.log('   空格 - 射击');
            console.log('   P - 暂停');
            console.log('   R - 重新开始');
            console.log('   💡 消灭所有敌人通过关卡');
            console.log('   💎 保护你的基地（底部金色标志）');
        })();
    </script>
</body>
